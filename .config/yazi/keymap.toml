#:schema https://raw.githubusercontent.com/yazi-rs/schemas/refs/heads/main/schemas/keymap.json

# =========================
# Manager layer ([mgr])
# =========================

# Move cursor down (vim j)
[[mgr.prepend_keymap]]
on = "j"
run = "arrow 1"
desc = "Move cursor down"

# Move cursor up (vim k)
[[mgr.prepend_keymap]]
on = "k"
run = "arrow -1"
desc = "Move cursor up"

# Jump to top (vim gg)
[[mgr.prepend_keymap]]
on = ["g", "g"]
run = "arrow top"
desc = "Go to top"

# Jump to bottom (vim G)
[[mgr.prepend_keymap]]
on = "G"
run = "arrow bot"
desc = "Go to bottom"

# Page down half screen (vim Ctrl-d)
[[mgr.prepend_keymap]]
on = "<C-d>"
run = "arrow 50%"
desc = "Move down half a page"

# Page up half screen (vim Ctrl-u)
[[mgr.prepend_keymap]]
on = "<C-u>"
run = "arrow -50%"
desc = "Move up half a page"

# Go to parent directory (vim h)
[[mgr.prepend_keymap]]
on = "h"
run = "leave"
desc = "Go to parent directory"

# Enter directory (vim l)
[[mgr.prepend_keymap]]
on = "l"
run = "enter"
desc = "Enter directory"

# History back (vim H style)
[[mgr.prepend_keymap]]
on = "H"
run = "back"
desc = "Go back in history"

# History forward (vim L style)
[[mgr.prepend_keymap]]
on = "L"
run = "forward"
desc = "Go forward in history"

# Enter visual selection mode (vim v)
[[mgr.prepend_keymap]]
on = "v"
run = "visual_mode"
desc = "Enter visual mode"

# Exit visual selection mode
[[mgr.prepend_keymap]]
on = "V"
run = "visual_mode --unset"
desc = "Exit visual mode"

# Toggle selection of hovered file
[[mgr.prepend_keymap]]
on = "<Space>"
run = "toggle"
desc = "Toggle selection"

# Open hovered or selected files
[[mgr.prepend_keymap]]
on = "<Enter>"
run = '''shell --block -- if [ -n "%h" ] && [ -d "%h" ]; then cd -- "%h" && nvim; elif [ -n "%h" ]; then nvim -- "%h"; else nvim; fi'''
desc = "Open directory/file in Neovim"

# Open with picker (interactive)
[[mgr.prepend_keymap]]
on = "o"
run = '''shell --block -- if [ -n "%h" ] && [ -d "%h" ]; then cd -- "%h" && nvim; else ya emit open --interactive --hovered; fi'''
desc = "Open directory in Neovim or file with picker"

# Show file metadata spotter (vim K convention)
[[mgr.prepend_keymap]]
on = "K"
run = "spot"
desc = "Show file information"

# Yank files (vim yy)
[[mgr.prepend_keymap]]
on = ["y", "y"]
run = "yank"
desc = "Yank selected files"

# Trash files safely with confirmation (vim dd)
[[mgr.prepend_keymap]]
on = ["d", "d"]
run = "remove"
desc = "Trash selected files"

# Permanently delete files with confirmation
[[mgr.prepend_keymap]]
on = ["d", "D"]
run = "remove --permanently"
desc = "Permanently delete selected files"

# Paste yanked files (vim p)
[[mgr.prepend_keymap]]
on = "p"
run = "paste"
desc = "Paste yanked files"

# Paste and overwrite destination if needed (vim P variant)
[[mgr.prepend_keymap]]
on = "P"
run = "paste --force"
desc = "Paste and overwrite existing files"

# Create file or directory (vim a for add)
[[mgr.prepend_keymap]]
on = "a"
run = "create"
desc = "Create file or directory"

# Rename hovered file
[[mgr.prepend_keymap]]
on = "r"
run = "rename"
desc = "Rename file"

# Start find in current list (vim /)
[[mgr.prepend_keymap]]
on = "/"
run = "find --smart"
desc = "Find next match"

# Jump to next find result (vim n)
[[mgr.prepend_keymap]]
on = "n"
run = "find_arrow"
desc = "Go to next find result"

# Jump to previous find result (vim N)
[[mgr.prepend_keymap]]
on = "N"
run = "find_arrow --previous"
desc = "Go to previous find result"

# Jump to directory using zoxide + fzf
[[mgr.prepend_keymap]]
on = "z"
run = '''shell --block -- dir="$(zoxide query -l | fzf --height=40% --layout=reverse --border --prompt='zoxide> ')"; [ -n "$dir" ] && ya emit cd -- "$dir"'''
desc = "Jump to directory from zoxide"

# Open key help
[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = "Open help"

# Close current tab, or quit if last tab
[[mgr.prepend_keymap]]
on = "q"
run = "close"
desc = "Close tab"

# Quit Yazi
[[mgr.prepend_keymap]]
on = "Q"
run = "quit"
desc = "Quit Yazi"

# Jump to code directory (existing custom shortcut)
[[mgr.prepend_keymap]]
on = ["g", "c"]
run = "cd ~/code/"
desc = "Go to code directory"

# Jump to dotfiles directory (existing custom shortcut)
[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/dotfiles/"
desc = "Go to dotfiles directory"

# Jump to .config directory (existing custom shortcut)
[[mgr.prepend_keymap]]
on = ["g", "C"]
run = "cd ~/.config/"
desc = "Go to .config directory"


